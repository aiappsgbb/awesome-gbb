metadata:
  name: daily-pipeline-health
spec:
  description: "Daily 06:00 UTC sweep — checks every Threadlight pilot's ACA revision health, replica restart rate, and SPEC § 11c SLO compliance over the last 24h."
  schedule: "0 6 * * *"
  prompt: |
    Run a daily health check across every Threadlight pilot in the
    monitored resource groups. For each pilot ACA app:

    1. List active revisions — flag any rollout stuck (`active=true` but
       `replicas=0` or `health != Healthy`)
    2. Count replica restarts in the last 24h — flag >3/hour as unstable
    3. Query App Insights for exception count by `threadlight.step_id`:
       ```
       exceptions
       | where timestamp > ago(24h)
       | where cloud_RoleName == "<pilot>"
       | summarize errors=count() by step_id=tostring(customDimensions["threadlight.step_id"])
       | order by errors desc
       ```
    4. For each step with errors, compare against SPEC § 11c declared
       error_budget (if knowledge base contains the pilot's SPEC.md)
    5. Compute approximate completion rate vs target SLO

    Output a single Markdown table per pilot:

    | Pilot | RG | Revision health | Restart rate | Failing steps | SLO status |
    |---|---|---|---|---|---|

    If everything is green, output `All <N> Threadlight pilots within SLO.`
  enabled: true
  mode: schedule
