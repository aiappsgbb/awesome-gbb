# Human-in-the-loop gate policy.
#
# Pattern: every "high-impact" tool call routes to a HITL approval queue
# instead of executing immediately. Combine with an HITL adapter
# (e.g., your threadlight workspace UI) that reads the deny reason
# and surfaces a "approve / reject" prompt to the SME reviewer.
#
# How:
#   - Default ALLOW (so read-only and lookup tools pass through)
#   - DENY with a HITL_REQUIRED reason for any tool whose call_id matches
#     a high-impact pattern
#   - Your application code interprets `reason.startswith("HITL_REQUIRED")`
#     as "open an approval ticket", not "abort"
name: foundry-agt-hitl-gate
version: "1.0"
description: |
  Routes high-impact tool calls (write, send, transfer, post, delete)
  to HITL approval. Pair with an upstream UI adapter that interprets
  HITL_REQUIRED reasons as approval tickets, not failures.
defaults:
  action: allow
rules:
  - name: hitl-write-tools
    priority: 100
    condition:
      field: tool_name
      operator: matches
      value: "(?i)^(send_|post_|transfer_|create_|update_|delete_|write_|approve_|charge_|refund_|payout_)"
    action: deny
    message: HITL_REQUIRED:write-tool

  - name: hitl-money-amount
    priority: 95
    condition:
      field: tool_args.amount
      operator: gt
      value: 1000
    action: deny
    message: HITL_REQUIRED:amount-over-threshold

  - name: hitl-customer-pii-write
    priority: 90
    condition:
      field: tool_name
      operator: in
      value:
        - "patch_customer_record"
        - "update_account_holder"
        - "merge_customer_profiles"
    action: deny
    message: HITL_REQUIRED:pii-write
