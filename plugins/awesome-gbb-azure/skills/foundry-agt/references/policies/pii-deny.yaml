# PII pattern-block policy.
#
# Defence-in-depth alongside Azure AI Content Safety / Presidio:
# these regex patterns catch the obvious leaks (SSN, credit card,
# IBAN, phone, email) in either the user message OR the agent's
# outbound response. Use the priority ladder to put high-value
# patterns first.
#
# NOTE: regex-based PII detection is necessarily imprecise. Use this
# as a guardrail, not a primary classifier. For high-stakes
# scenarios pair with a model-based classifier in the same stack.
name: foundry-agt-pii-deny
version: "1.0"
description: |
  Block obvious PII patterns in inputs and outputs. Patterns are
  regional shorthand — extend per locale. Pair with a content-safety
  evaluator for production.
defaults:
  action: allow
rules:
  - name: block-us-ssn
    priority: 100
    condition:
      field: message
      operator: matches
      value: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    action: deny
    message: US SSN pattern detected.

  - name: block-credit-card
    priority: 95
    condition:
      field: message
      operator: matches
      # Visa / MC / Amex / Discover prefix shapes, hyphen-or-space-separated
      value: "\\b(?:4\\d{3}|5[1-5]\\d{2}|3[47]\\d{2}|6011)[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"
    action: deny
    message: Credit card number pattern detected.

  - name: block-iban
    priority: 90
    condition:
      field: message
      operator: matches
      value: "\\b[A-Z]{2}\\d{2}[A-Z0-9]{4}\\d{7}([A-Z0-9]?){0,16}\\b"
    action: deny
    message: IBAN pattern detected.

  - name: block-output-ssn
    priority: 80
    condition:
      field: response
      operator: matches
      value: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    action: deny
    message: Outbound response contains SSN pattern; refusing.
