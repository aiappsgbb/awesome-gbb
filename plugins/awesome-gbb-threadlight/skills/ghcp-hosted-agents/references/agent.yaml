# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: my-agent
description: Agent using GHCP SDK with Invocations protocol
metadata:
  tags:
    - ghcp-sdk
    - hosted-agent
protocols:
  - protocol: invocations    # GHCP SDK SSE streaming (container runtime)
    version: 1.0.0
# NOTE: Do NOT add protocol: responses here. InvocationAgentServerHost only
# serves /invocations — the /responses endpoint returns 404 even if declared.
# External callers (bot, azd invoke) must use the Invocations SSE endpoint.
# If you need Responses API (e.g., for a Teams bot using oai.responses.create()),
# switch to MAF runtime (ResponsesHostServer) instead.
environment_variables:
  - name: MODEL_DEPLOYMENT_NAME
    value: gpt-5.4
  # Add MCP server FQDNs if needed:
  # - name: MCP_SERVER_FQDN
  #   value: ${MCP_SERVER_FQDN}
resources:
  cpu: "1"
  memory: 2Gi
