<!--
  decision-pane.html — agent recommendation + evidence + citations
  Drop-in panel for the right zone of any analyst workspace shape.
  Vanilla HTML/CSS/JS. No framework, no build step.

  Data contract (read from window.threadlight.recommendation):
    {
      summary:    string,                          // 1-2 sentence headline
      confidence: number 0..1,                     // shown as bar + label
      evidence:   Array<{
        id:    string,
        type:  "transaction" | "document" | "policy" | "other",
        title: string,
        body:  string,                             // short summary
        link?: string                              // optional deep link
      }>,
      citations:  Array<{
        id:     string,                            // e.g. "BR-005" or "Reg E §1005.11"
        source: string,                            // "Reg E" | "Visa Core Rules" | "internal"
        text:   string                             // exact quote
      }>
    }

  Wires to: window.threadlight.activeCase (for the header), and reads
  window.threadlight.actions to size the slot reserved for the
  action-toolbar (rendered separately by action-toolbar.html).
-->
<section class="tl-decision-pane" data-panel="decision-pane" hidden>
  <header class="tl-dp-header">
    <span class="tl-dp-eyebrow">Agent recommendation</span>
    <h2 class="tl-dp-summary"></h2>
    <div class="tl-dp-confidence" aria-label="Confidence">
      <span class="tl-dp-conf-label"></span>
      <div class="tl-dp-conf-bar"><div class="tl-dp-conf-fill"></div></div>
    </div>
  </header>

  <div class="tl-dp-body">
    <section class="tl-dp-evidence">
      <h3>Evidence</h3>
      <ul class="tl-dp-evidence-list" role="list"></ul>
    </section>
    <section class="tl-dp-citations">
      <h3>Citations</h3>
      <ul class="tl-dp-citations-list" role="list"></ul>
    </section>
  </div>

  <!-- Slot for action-toolbar.html (rendered by action-toolbar controller) -->
  <div class="tl-dp-actions-slot" data-slot="action-toolbar"></div>
</section>

<style>
  .tl-decision-pane {
    --accent: #0078d4;            /* override per process */
    --bg: #ffffff;
    --surface: #f8f8fb;
    --ink: #20232a;
    --muted: #5b6271;
    --border: #e1e3e8;
    --good: #107c10;
    --warn: #ca5010;
    --bad:  #a4262c;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    border-left: 3px solid var(--accent);
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 16px;
    height: 100%; overflow-y: auto;
  }
  .tl-dp-header { border-bottom: 1px solid var(--border); padding-bottom: 14px; }
  .tl-dp-eyebrow {
    display: inline-block; font-size: 11px; font-weight: 600;
    color: var(--accent); letter-spacing: .8px; text-transform: uppercase;
  }
  .tl-dp-summary { margin: 8px 0 12px; font-size: 18px; line-height: 1.35; font-weight: 600; }
  .tl-dp-confidence { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
  .tl-dp-conf-label { min-width: 110px; }
  .tl-dp-conf-bar { flex: 1; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .tl-dp-conf-fill { height: 100%; background: var(--accent); transition: width .3s; }

  .tl-dp-body { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 900px) { .tl-dp-body { grid-template-columns: 1.4fr 1fr; } }
  .tl-dp-body h3 {
    font-size: 12px; font-weight: 600; letter-spacing: .6px;
    text-transform: uppercase; color: var(--muted); margin: 0 0 10px;
  }

  .tl-dp-evidence-list, .tl-dp-citations-list {
    list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px;
  }
  .tl-dp-evidence-list li, .tl-dp-citations-list li {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
  }
  .tl-dp-ev-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
  .tl-dp-ev-type {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    padding: 2px 6px; color: var(--muted);
  }
  .tl-dp-ev-body { color: var(--ink); font-size: 13px; line-height: 1.5; }
  .tl-dp-ev-link { color: var(--accent); text-decoration: none; font-size: 12px; margin-top: 6px; display: inline-block; }
  .tl-dp-cit-id { font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace; font-weight: 700; color: var(--accent); }
  .tl-dp-cit-source { color: var(--muted); font-size: 12px; margin-left: 6px; }
  .tl-dp-cit-text { font-style: italic; color: var(--ink); margin-top: 4px; line-height: 1.5; }

  .tl-dp-actions-slot { border-top: 1px solid var(--border); padding-top: 16px; }
</style>

<script>
  (function () {
    const root = document.querySelector('[data-panel="decision-pane"]');
    if (!root) return;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function render() {
      const tl = window.threadlight || {};
      const rec = tl.recommendation;
      if (!rec) { root.hidden = true; return; }
      root.hidden = false;

      root.querySelector('.tl-dp-summary').textContent = rec.summary || '(no summary)';

      const confPct = Math.round((Number(rec.confidence) || 0) * 100);
      root.querySelector('.tl-dp-conf-label').textContent = `Confidence ${confPct}%`;
      root.querySelector('.tl-dp-conf-fill').style.width = `${confPct}%`;

      const evidence = Array.isArray(rec.evidence) ? rec.evidence : [];
      root.querySelector('.tl-dp-evidence-list').innerHTML = evidence.length
        ? evidence.map(e => `
            <li data-ev-id="${escapeHtml(e.id)}">
              <div class="tl-dp-ev-title">
                <span class="tl-dp-ev-type">${escapeHtml(e.type || 'other')}</span>
                ${escapeHtml(e.title || e.id || '(untitled)')}
              </div>
              <div class="tl-dp-ev-body">${escapeHtml(e.body || '')}</div>
              ${e.link ? `<a class="tl-dp-ev-link" href="${escapeHtml(e.link)}" target="_blank" rel="noopener">Open ↗</a>` : ''}
            </li>`).join('')
        : '<li><em>No evidence captured by the agent.</em></li>';

      const citations = Array.isArray(rec.citations) ? rec.citations : [];
      root.querySelector('.tl-dp-citations-list').innerHTML = citations.length
        ? citations.map(c => `
            <li>
              <div>
                <span class="tl-dp-cit-id">${escapeHtml(c.id)}</span>
                <span class="tl-dp-cit-source">${escapeHtml(c.source || '')}</span>
              </div>
              <div class="tl-dp-cit-text">${escapeHtml(c.text || '')}</div>
            </li>`).join('')
        : '<li><em>No citations on this recommendation — flag for QA per BR-007.</em></li>';
    }

    render();
    window.addEventListener('threadlight:case-changed', render);
    window.addEventListener('threadlight:recommendation-updated', render);
  })();
</script>
