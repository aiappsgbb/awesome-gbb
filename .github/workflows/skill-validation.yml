name: Skill validation

on:
  # `validate` is a REQUIRED status check in `main` branch protection. A
  # required check that is `paths:`-filtered never reports on non-matching PRs,
  # leaving them permanently BLOCKED (the path-filter-vs-required-check
  # deadlock — AGENTS.md § 9.6). So: NO `paths:` filter on pull_request. The
  # catalog-wide validators finish in <1 min and are NOT the heavy
  # copilot-cli matrix, so every-PR runs are cheap.
  pull_request:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "plugin.json"
      - ".github/plugin/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Validate all SKILL.md, pin files, and plugin manifest
        run: python scripts/validate-skills.py

      - name: Verify single-plugin structure
        run: python scripts/build-plugins.py --check

      - name: Validate docs site (link integrity)
        run: python scripts/build-site.py --validate
