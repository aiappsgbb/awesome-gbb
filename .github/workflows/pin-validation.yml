name: Pin validation

# Runs validation.script for every modified upstream-pin.md and asserts
# expected_output substrings appear. This is the CI proof-of-test for
# every freshness PR (human or Copilot Coding Agent).
#
# Skips pin files where:
#   - automation_tier != auto (human-validated tiers)
#   - validation.runnable is false
#   - validation.requires has anything outside {github_only, pypi}
#     (because the runner has no Azure / Foundry credentials)

on:
  # `validate-pins` is a REQUIRED status check in `main` branch protection. A
  # required check that is `paths:`-filtered never reports on non-matching PRs,
  # leaving them permanently BLOCKED (the path-filter-vs-required-check
  # deadlock — AGENTS.md § 9.6). So: NO `paths:` filter on pull_request.
  # run-pin-validation.py groups changes by skill folder and prints
  # "No pin files to validate ✅" / exits 0 when no skill folder changed, so
  # every-PR runs are cheap.
  pull_request:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/run-pin-validation.py"

permissions:
  contents: read

jobs:
  validate-pins:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runner deps
        run: pip install --quiet pyyaml

      - name: Run validation.script for changed pins
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # On push, base_ref is empty — compare against the previous commit
            python scripts/run-pin-validation.py --base=HEAD~1
          else
            python scripts/run-pin-validation.py --base=origin/${{ github.base_ref }}
          fi
