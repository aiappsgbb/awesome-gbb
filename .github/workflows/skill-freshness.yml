name: Skill freshness

on:
  schedule:
    # Monday 07:00 UTC — quiet hour, doesn't collide with workshops
    - cron: "0 7 * * 1"
    # Thursday 07:00 UTC — redundancy in case Monday runner/GHA has an outage
    - cron: "0 7 * * 4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no issue writes)"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pyyaml requests

      - name: Detect drift and upsert issues
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Assigning the Copilot coding agent requires a PAT (or GitHub
          # App token) with issues:write — the default GITHUB_TOKEN CANNOT
          # assign the Copilot bot (GitHub returns 422 / silently no-ops).
          # Add a repo secret COPILOT_ASSIGN_PAT to enable auto-assignment;
          # if absent, issue creation still works and assignment is skipped
          # with a WARN. See scripts/check-freshness.py:assign_copilot_to_issue.
          GH_ASSIGN_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          ARGS="--upsert-issues --consolidated --assign-copilot-on-auto-tier --labels freshness,automation --output report.md --print-report"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/check-freshness.py $ARGS

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: report.md
          if-no-files-found: warn
