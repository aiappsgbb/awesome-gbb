name: Skill tests

# Consolidated test suite for the awesome-gbb catalog.
# - unit-tests + catalog-lint: run on push to main + schedule + dispatch
# - pin-smoke: run ALL auto-tier pin scripts (weekly + dispatch)
# - e2e-azure: run ALL pin scripts including Azure-dependent ones (weekly + dispatch)
#
# PR-gating is handled by skill-validation.yml, automation-pr-gate.yml,
# and pin-validation.yml. This workflow adds periodic + on-demand coverage.

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/tests/test_e2e_*.py"
      - ".github/workflows/skill-test.yml"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/**"
      - "plugin.json"
      - ".github/plugin/**"
      - ".github/workflows/skill-test.yml"
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC (after freshness at 07:00)
    - cron: "0 8 * * 4"  # Thursday 08:00 UTC (redundancy)
  workflow_dispatch:
    inputs:
      include_azure:
        description: "Run E2E Azure tests (needs OIDC secrets)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # OIDC for Azure login in e2e-azure job

jobs:
  # ── Job 1: Unit tests ──────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Run unit tests
        run: python -m unittest discover -s scripts/tests -p 'test_*.py' -v

  # ── Job 2: Catalog lint (validate-skills + build-plugins) ──────────
  catalog-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Validate all SKILL.md, pin files, and plugin manifest
        run: python scripts/validate-skills.py

      - name: Verify single-plugin structure
        run: python scripts/build-plugins.py --check

  # ── Job 3: Pin smoke (all auto-tier, no Azure) ────────────────────
  pin-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runner deps
        run: pip install --quiet pyyaml

      - name: Run pin validations
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # On PRs: only validate changed pins (don't let unrelated failures block)
            python scripts/run-pin-validation.py --base=origin/${{ github.base_ref }}
          else
            # On push/schedule: validate ALL pins
            python scripts/run-pin-validation.py --all
          fi

  # ── Job 4: E2E Azure (all pins including Azure-dependent) ──────────
  e2e-azure:
    if: >-
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.include_azure)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Note: secrets are at repo level. OIDC federated credentials on the
    # UAMI cover three subjects (string-match only — Entra does NOT support
    # wildcards or claimsMatchingExpression for the GitHub Actions issuer):
    #   - repo:aiappsgbb/awesome-gbb:pull_request       (PR events)
    #   - repo:aiappsgbb/awesome-gbb:ref:refs/heads/main (push to main)
    #   - repo:aiappsgbb/awesome-gbb:ref:refs/tags/*    (release tags)
    # workflow_dispatch on non-main branches will FAIL with AADSTS700213
    # unless a branch-specific FIC is created on the UAMI first.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runner deps
        run: pip install --quiet pyyaml pytest

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run pin validations (including Azure E2E)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # On PRs: only validate changed pins
            python scripts/run-pin-validation.py --base=origin/${{ github.base_ref }} --include-azure
          else
            # On push/schedule: validate ALL pins
            python scripts/run-pin-validation.py --all --include-azure
          fi

      # Note: `always() &&` decouples each pytest from the preceding
      # pin-validation step so a single pin failure doesn't skip live E2E
      # coverage. These run on PRs too because the `pull_request` OIDC
      # subject is covered by the `github-pr` federated credential and
      # the repo policy is "every skill must be field-tested on Azure".
      - name: Run E2E prompt agent test
        if: always()
        env:
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
        run: |
          pip install --quiet "azure-ai-projects~=2.1.0" "azure-identity~=1.23.0"
          python -m pytest scripts/tests/test_e2e_prompt_agents.py -v

      - name: Run E2E voice-live test
        if: always()
        env:
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
        run: |
          pip install --quiet "openai~=2.0.0" "azure-identity~=1.23.0"
          python -m pytest scripts/tests/test_e2e_voice_live.py -v

      - name: Run E2E foundry-toolbox test
        if: always()
        env:
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
        run: |
          pip install --quiet "agent-framework~=1.6.0" "agent-framework-foundry~=1.6.0" "azure-identity~=1.25.3" "mcp~=1.27.0" "tenacity~=8.5.0"
          python -m pytest scripts/tests/test_e2e_foundry_toolbox.py -v

  # ── Job 5: Build skill-matrix (PR + push + dispatch + schedule) ────
  # Reads scripts/build-test-matrix.py and emits a JSON list of skills
  # that have a test-fixture/consumer_prompt.md AND are NOT quarantined.
  # The downstream copilot-cli-matrix job fans out one runner per skill.
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - id: build
        run: echo "matrix=$(python scripts/build-test-matrix.py --repo-root .)" >> "$GITHUB_OUTPUT"

  # ── Job 6: Copilot-CLI consumer matrix (new — Task 2.1 pilot) ──────
  # Spawns ONE runner per discovered skill. Each runner installs the
  # Copilot CLI, points it at Foundry (gpt-5.4-mini in aif-awesome-gbb-ci)
  # via BYOK env vars, and runs the skill's consumer_prompt.md fixture.
  # Success contract: last line of stdout is `SMOKE_RESULT=PASS`.
  copilot-cli-matrix:
    needs: build-matrix
    if: fromJSON(needs.build-matrix.outputs.matrix).skill[0] != null
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Copilot CLI
        # Node 22 is pre-installed on ubuntu-latest. npm install is the
        # documented install path; proven green by
        # .github/workflows/copilot-cli-foundry-auth-smoke.yml.
        # Do NOT use `curl … install.sh | bash` — no canonical URL exists.
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: Install awesome-gbb plugin from this checkout
        run: |
          copilot plugin marketplace add "$GITHUB_WORKSPACE"
          copilot plugin install awesome-gbb@awesome-gbb

      - name: Get Foundry bearer token
        # `--resource` takes the v1 AAD audience identifier (NO `/.default`
        # suffix). Passing the v2 scope form to `--resource` produces
        # AADSTS500011 "resource principal not found". The auth-smoke
        # workflow (L63-75) documents this in detail and is the canonical
        # reference. `tr -d '\r\n'` defends against trailing newline from
        # `-o tsv` that would otherwise produce a cryptic 401 from Foundry.
        run: |
          set -euo pipefail
          TOKEN=$(az account get-access-token \
            --resource https://cognitiveservices.azure.com \
            --query accessToken -o tsv | tr -d '\r\n')
          echo "::add-mask::$TOKEN"
          echo "COPILOT_PROVIDER_BEARER_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Run consumer prompt for ${{ matrix.skill }}
        id: run
        env:
          # BYOK routing → Foundry, identical to the auth-smoke workflow.
          # Env-var names verified against CLI 1.0.57-2 via `copilot help
          # providers` / `copilot help environment` (Task 1.0). Legacy
          # `COPILOT_MODEL_*` names DO NOT EXIST and would be silently
          # ignored.
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: gpt-5.4-mini
          COPILOT_PROVIDER_WIRE_MODEL: gpt-5.4-mini
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          # Foundry project endpoint + model deployment exposed to the
          # consumer fixture. `AZURE_AI_ENDPOINT` is the account host
          # (cognitiveservices.azure.com); `FOUNDRY_PROJECT_ENDPOINT` is
          # the per-project URL on the services.ai.azure.com host that
          # `AIProjectClient(endpoint=…)` requires. These are CI
          # infrastructure URLs/names, not secrets.
          FOUNDRY_PROJECT_ENDPOINT: https://aif-awesome-gbb-ci.services.ai.azure.com/api/projects/ci-test
          FOUNDRY_MODEL_DEPLOYMENT: gpt-5.4-mini
        run: |
          set -euo pipefail
          PROMPT="skills/${{ matrix.skill }}/test-fixture/consumer_prompt.md"
          test -f "$PROMPT" || { echo "missing fixture: $PROMPT"; exit 2; }
          # `-p` is the released CLI's one-shot prompt form. `copilot run`
          # does not exist; `--prompt-file` does not exist. Inline the
          # fixture body with $(cat …). `--disable-builtin-mcps` drops the
          # GitHub MCP server so this test doesn't depend on github.com
          # reachability — fixtures opt back in to specific MCP servers
          # via `--allow-tool=mcp__…` flags.
          copilot -p "$(cat "$PROMPT")" \
                  --allow-all-tools \
                  --disable-builtin-mcps \
                  -C "$GITHUB_WORKSPACE" \
                  2>&1 | tee "/tmp/${{ matrix.skill }}-transcript.log"
          # Marker contract: the fixture must emit `SMOKE_RESULT=PASS` on a
          # line by itself somewhere in the transcript. We cannot use
          # `tail -n 1` because the Copilot CLI itself appends a footer
          # (`Changes / Duration / Tokens`) to stdout that the agent has
          # no way to suppress. An explicit `SMOKE_RESULT=FAIL` from the
          # agent still wins over PASS — check FAIL first.
          if grep -qE "^SMOKE_RESULT=FAIL" "/tmp/${{ matrix.skill }}-transcript.log"; then
            echo "fixture explicitly reported failure"; exit 1
          fi
          grep -q "^SMOKE_RESULT=PASS$" "/tmp/${{ matrix.skill }}-transcript.log" \
            || { echo "fixture did not print SMOKE_RESULT=PASS marker"; exit 1; }

      - name: Retry once on classified-transient failure
        if: failure() && steps.run.outcome == 'failure'
        env:
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: gpt-5.4-mini
          COPILOT_PROVIDER_WIRE_MODEL: gpt-5.4-mini
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          FOUNDRY_PROJECT_ENDPOINT: https://aif-awesome-gbb-ci.services.ai.azure.com/api/projects/ci-test
          FOUNDRY_MODEL_DEPLOYMENT: gpt-5.4-mini
        run: |
          set -euo pipefail
          PROMPT="skills/${{ matrix.skill }}/test-fixture/consumer_prompt.md"
          if grep -qE "429|503|throttl|capacity|EOF during azd deploy|revision .* not found" "/tmp/${{ matrix.skill }}-transcript.log"; then
            echo "classified-transient — retrying once"
            copilot -p "$(cat "$PROMPT")" \
                    --allow-all-tools \
                    --disable-builtin-mcps \
                    -C "$GITHUB_WORKSPACE" \
                    2>&1 | tee "/tmp/${{ matrix.skill }}-retry.log"
            if grep -qE "^SMOKE_RESULT=FAIL" "/tmp/${{ matrix.skill }}-retry.log"; then
              echo "retry explicitly reported failure"; exit 1
            fi
            grep -q "^SMOKE_RESULT=PASS$" "/tmp/${{ matrix.skill }}-retry.log" \
              || { echo "retry did not print SMOKE_RESULT=PASS marker"; exit 1; }
          else
            echo "non-transient failure — not retrying"
            exit 1
          fi

      - name: Upload transcript (forensics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transcript-${{ matrix.skill }}
          path: /tmp/${{ matrix.skill }}-transcript.log
          retention-days: 7
