name: Auto-merge Copilot PRs

# Automatically merges PRs from the Copilot coding agent when all CI
# checks pass. Triggered after any of the 4 CI gate workflows complete.
# The CI gates are the quality bar — if they all pass, the PR is safe
# to merge without human review.

on:
  workflow_run:
    workflows:
      - "Skill validation"
      - "Automation PR gate"
      - "Pin validation"
      - "Skill tests"
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Auto-merge Copilot PRs with all checks passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List open non-draft PRs from copilot-swe-agent
          gh pr list --repo "$GITHUB_REPOSITORY" \
            --author "app/copilot-swe-agent" \
            --state open \
            --json number,title,isDraft \
            --jq '.[] | select(.isDraft == false) | .number' | while read -r pr_num; do

            title=$(gh pr view "$pr_num" --repo "$GITHUB_REPOSITORY" --json title --jq '.title')

            # Count checks that aren't passing
            pending=$(gh pr checks "$pr_num" --repo "$GITHUB_REPOSITORY" \
              --json name,state \
              --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')

            total=$(gh pr checks "$pr_num" --repo "$GITHUB_REPOSITORY" \
              --json name,state --jq 'length')

            if [ "$total" -lt 4 ]; then
              echo "#$pr_num: only $total checks (need ≥4), skipping"
              continue
            fi

            if [ "$pending" -ne 0 ]; then
              echo "#$pr_num: $pending check(s) not passed, skipping"
              continue
            fi

            echo "#$pr_num: all $total checks passed — merging: $title"
            gh pr merge "$pr_num" --repo "$GITHUB_REPOSITORY" \
              --squash --delete-branch \
              --body "✅ Auto-merged — all CI gates passed." || \
            echo "WARN: could not merge #$pr_num"
          done
