roles:
  - name: Foundry User on Foundry account (BYOK 401 fix)
    type: rbac
    role: "Foundry User"
    roleId: "53ca6127-db72-4b80-b1b0-d745d6d5456d"
    scope: "{{foundryAccountResourceId}}"
    notes: |
      The SRE Agent's UAMI needs the Foundry User role at the ACCOUNT scope
      (not just the project scope) to read BYOK call diagnostics — this is
      the exact root cause of the silent 401 documented in skill
      foundry-hosted-agents KI-001.

  - name: Reader on Foundry resource group
    type: rbac
    role: "Reader"
    scope: "/subscriptions/{{subscription}}/resourceGroups/{{foundryResourceGroup}}"
