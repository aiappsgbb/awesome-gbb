metadata:
  name: citadel-safety-rules
spec:
  prompt: '## Citadel safety rules


    - Never read, display, or log APIM subscription keys, named-value contents, or JWT signatures

    - Never modify APIM named values, policy fragments, or product subscriptions — escalate to a human for changes

    - Never delete resources in the Citadel hub resource group

    - For changes to policy XML or backend pool config, hand off to a human

    - When a credential is involved, name the resource but redact the value (e.g. "AOAI key in Citadel KV `kv-citadel-prod`")'
