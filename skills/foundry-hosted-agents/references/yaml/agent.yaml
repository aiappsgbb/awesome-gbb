# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
#
# Canonical agent.yaml — the ContainerAgent schema read by `azd ai agent`
# extension at deploy time. Source of truth for the prose example in
# `../../SKILL.md § agent.yaml (ContainerAgent Schema)`.
#
# CRITICAL: this file uses LITERAL values, no template substitution.
# If you copied a `{{...}}` mustache from agent.manifest.yaml into here,
# the agent container will start with the literal string and 404 on the
# missing model deployment. Verified in 2026-05-29 hybrid-mcp-agent run
# (agentic-loop SKILL Validation history row 7, MID-3).
#
# For the mustache-templated companion (read by `azd ai agent init` at
# scaffold time), see ../yaml/agent.manifest.yaml.

name: my-agent
description: My agent description
kind: hosted
protocols:
  - protocol: responses
    version: 1.0.0
environment_variables:
  - name: MODEL_DEPLOYMENT_NAME
    value: gpt-5.4   # LITERAL value; default for production. Use gpt-5.4-mini
                     # only for trivial 1-2-step flows. NEVER write '{{...}}' here.
resources:
  cpu: "1"
  memory: 2Gi
