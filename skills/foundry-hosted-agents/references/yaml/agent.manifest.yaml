# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft-foundry/foundry-samples/main/schemas/agent.manifest.schema.json
#
# Canonical agent.manifest.yaml — the SCAFFOLD-time format read by
# `azd ai agent init` (the interactive scaffolder shipped by the
# `azure.ai.agents` extension v0.1.34-preview+).
#
# CRITICAL: this file supports `{{VAR}}` mustache substitution at scaffold
# time. When you run `azd ai agent init -m <this-file>`, the scaffolder
# reads this manifest, asks for values, and emits `agent.yaml` with the
# substituted literals. After scaffold, edit `agent.yaml` directly for
# literal value changes — DO NOT hand-edit this file expecting the mustache
# to substitute, because it only does at scaffold time.
#
# See ../yaml/agent.yaml for the post-scaffold ContainerAgent file (literal
# values, read by `azd ai agent` at deploy time).
#
# Two-schemas-don't-confuse-them rule: agent.manifest.yaml is mustache-templated;
# agent.yaml is literal-only. Verified in 2026-05-29 hybrid-mcp-agent run
# (agentic-loop SKILL Validation history row 7, MID-3).

name: my-agent
description: My agent description
kind: hosted
protocols:
  - protocol: responses
    version: 1.0.0
environment_variables:
  - name: MODEL_DEPLOYMENT_NAME
    value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"   # mustache: substituted at scaffold time
resources:
  cpu: "1"
  memory: 2Gi
