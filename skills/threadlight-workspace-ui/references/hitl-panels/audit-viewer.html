<!--
  audit-viewer.html — read-only immutable audit log
  Drop-in drawer panel for any analyst workspace shape.
  Triggered by a button on any case row OR a globe icon in the top bar.
  Vanilla HTML/CSS/JS. No framework.

  Data contract (read from window.threadlight.audit):
    Array<{
      id:        string,
      ts:        string,        // ISO 8601, UTC
      actor:     string,        // "Alice K. (analyst)" | "agent" | "system"
      actorKind: "human" | "agent" | "system",
      action:    string,        // "approve" | "rejected" | "edited-recommendation" | "escalated" | "agent-emit"
      target:    string,        // case id or sub-entity
      details:   string,        // free-text summary
      reason?:   string,        // operator-supplied reason if any
      br?:       string,        // BR-XXX that was hit
      sig?:      string         // optional signature hash for tamper evidence
    }>

  Listens to:
    - 'threadlight:action-submitted' — appends a row optimistically
    - 'threadlight:case-changed'     — refreshes view for the new case

  Exports:
    - "Export CSV" button writes window.threadlight.audit to a CSV download
    - "Export PDF" button is a stub that calls window.threadlight.exportAuditPdf
      (parent supplies — typically the agent's save_report tool through the bot)
-->
<aside class="tl-audit-drawer" data-panel="audit-viewer" hidden aria-label="Audit log">
  <header class="tl-av-header">
    <div>
      <span class="tl-av-eyebrow">Audit log</span>
      <h2 class="tl-av-title">Case <span class="tl-av-case-id">—</span></h2>
      <div class="tl-av-meta"></div>
    </div>
    <div class="tl-av-controls">
      <button type="button" class="tl-av-btn" data-action="export-csv">Export CSV</button>
      <button type="button" class="tl-av-btn" data-action="export-pdf">Export PDF</button>
      <button type="button" class="tl-av-btn tl-av-btn-close" data-action="close" aria-label="Close">×</button>
    </div>
  </header>
  <ol class="tl-av-list" role="list"></ol>
  <footer class="tl-av-footer">
    <span class="tl-av-immutable">Immutable record · sorted oldest → newest · times in UTC</span>
  </footer>
</aside>

<style>
  .tl-audit-drawer {
    --accent: #0078d4;
    --bg: #ffffff;
    --surface: #f8f8fb;
    --ink: #20232a;
    --muted: #5b6271;
    --border: #e1e3e8;
    --human: #0078d4;
    --agent: #5c2d91;
    --system: #5b6271;
    position: fixed; top: 0; right: 0; height: 100vh;
    width: min(520px, 92vw);
    background: var(--bg); border-left: 3px solid var(--accent);
    box-shadow: -8px 0 24px rgba(0, 0, 0, .08);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px; color: var(--ink);
    display: flex; flex-direction: column;
    z-index: 1000;
    transform: translateX(100%); transition: transform .25s ease-out;
  }
  .tl-audit-drawer:not([hidden]) { transform: translateX(0); }

  .tl-av-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .tl-av-eyebrow {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--accent); letter-spacing: .8px; text-transform: uppercase;
  }
  .tl-av-title { margin: 6px 0 4px; font-size: 16px; font-weight: 600; }
  .tl-av-case-id { font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace; }
  .tl-av-meta { font-size: 12px; color: var(--muted); }
  .tl-av-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .tl-av-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 10px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink);
  }
  .tl-av-btn:hover { background: var(--surface); }
  .tl-av-btn-close { font-size: 18px; line-height: 1; padding: 2px 8px; }

  .tl-av-list {
    list-style: none; padding: 0; margin: 0;
    overflow-y: auto; flex: 1;
  }
  .tl-av-list li {
    border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: grid;
    grid-template-columns: auto 1fr; gap: 12px;
  }
  .tl-av-list li:hover { background: var(--surface); }
  .tl-av-time {
    font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace;
    font-size: 11px; color: var(--muted);
    white-space: nowrap; padding-top: 2px;
  }
  .tl-av-row-body { min-width: 0; }
  .tl-av-actor {
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 600; font-size: 13px;
  }
  .tl-av-actor-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  }
  .tl-av-actor[data-kind="human"]  .tl-av-actor-dot { background: var(--human); }
  .tl-av-actor[data-kind="agent"]  .tl-av-actor-dot { background: var(--agent); }
  .tl-av-actor[data-kind="system"] .tl-av-actor-dot { background: var(--system); }
  .tl-av-action {
    font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace;
    font-size: 12px; background: var(--surface); border-radius: 3px;
    padding: 1px 6px; color: var(--muted); margin-left: 6px;
  }
  .tl-av-br {
    font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace;
    font-size: 11px; color: var(--accent); font-weight: 600; margin-left: 6px;
  }
  .tl-av-details { font-size: 13px; color: var(--ink); margin-top: 4px; line-height: 1.5; word-wrap: break-word; }
  .tl-av-reason { font-style: italic; color: var(--muted); margin-top: 4px; font-size: 12px; }
  .tl-av-sig    { font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); margin-top: 4px; opacity: .65; }

  .tl-av-footer {
    border-top: 1px solid var(--border); padding: 10px 20px;
    font-size: 11px; color: var(--muted);
  }
</style>

<script>
  (function () {
    const root = document.querySelector('[data-panel="audit-viewer"]');
    if (!root) return;

    const listEl = root.querySelector('.tl-av-list');
    const caseIdEl = root.querySelector('.tl-av-case-id');
    const metaEl = root.querySelector('.tl-av-meta');

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function fmtTime(iso) {
      try { return new Date(iso).toISOString().replace('T', ' ').slice(0, 19) + 'Z'; }
      catch { return iso; }
    }

    function render() {
      const tl = window.threadlight || {};
      const log = Array.isArray(tl.audit) ? tl.audit.slice().sort((a, b) => (a.ts > b.ts ? 1 : -1)) : [];
      const caseId = ((tl.activeCase || {}).id) || '—';
      caseIdEl.textContent = caseId;
      metaEl.textContent = `${log.length} entr${log.length === 1 ? 'y' : 'ies'}`;
      listEl.innerHTML = log.length
        ? log.map(e => `
            <li data-id="${escapeHtml(e.id)}">
              <span class="tl-av-time">${escapeHtml(fmtTime(e.ts))}</span>
              <div class="tl-av-row-body">
                <div>
                  <span class="tl-av-actor" data-kind="${escapeHtml(e.actorKind || 'system')}">
                    <span class="tl-av-actor-dot"></span>${escapeHtml(e.actor || '(unknown)')}
                  </span>
                  <span class="tl-av-action">${escapeHtml(e.action || '')}</span>
                  ${e.br ? `<span class="tl-av-br">${escapeHtml(e.br)}</span>` : ''}
                </div>
                <div class="tl-av-details">${escapeHtml(e.details || '')}</div>
                ${e.reason ? `<div class="tl-av-reason">Reason: ${escapeHtml(e.reason)}</div>` : ''}
                ${e.sig ? `<div class="tl-av-sig">sig: ${escapeHtml(e.sig)}</div>` : ''}
              </div>
            </li>`).join('')
        : '<li><em style="color:#5b6271">No audit entries yet for this case.</em></li>';
    }

    function open()  { root.hidden = false; render(); }
    function close() { root.hidden = true; }

    root.querySelector('[data-action="close"]').addEventListener('click', close);
    root.querySelector('[data-action="export-csv"]').addEventListener('click', exportCsv);
    root.querySelector('[data-action="export-pdf"]').addEventListener('click', exportPdf);

    function exportCsv() {
      const tl = window.threadlight || {};
      const log = Array.isArray(tl.audit) ? tl.audit : [];
      const headers = ['id', 'ts', 'actor', 'actorKind', 'action', 'target', 'br', 'reason', 'details', 'sig'];
      const escapeCsv = v => {
        const s = String(v == null ? '' : v);
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      };
      const csv = [headers.join(','), ...log.map(r => headers.map(h => escapeCsv(r[h])).join(','))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const caseId = ((tl.activeCase || {}).id) || 'case';
      a.href = url; a.download = `${caseId}-audit.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function exportPdf() {
      const tl = window.threadlight || {};
      if (typeof tl.exportAuditPdf === 'function') {
        try { await tl.exportAuditPdf(); }
        catch (err) { alert(`PDF export failed: ${err && err.message ? err.message : err}`); }
      } else {
        alert('PDF export not wired. Implement window.threadlight.exportAuditPdf — typically routes through the agent\'s save_report tool.');
      }
    }

    window.addEventListener('threadlight:action-submitted', e => {
      const tl = window.threadlight || (window.threadlight = {});
      tl.audit = Array.isArray(tl.audit) ? tl.audit : [];
      tl.audit.push({
        id: `aud-${Date.now()}`,
        ts: new Date().toISOString(),
        actor: 'You',
        actorKind: 'human',
        action: e.detail.actionId,
        target: e.detail.caseId,
        details: `Action submitted via workspace decision pane.`,
        reason: e.detail.reason || ''
      });
      if (!root.hidden) render();
    });
    window.addEventListener('threadlight:case-changed', () => { if (!root.hidden) render(); });
    window.addEventListener('threadlight:open-audit', open);

    window.openThreadlightAudit = open;
    window.closeThreadlightAudit = close;
  })();
</script>
