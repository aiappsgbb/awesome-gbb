# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: my-agent
description: Agent using GHCP SDK with Invocations protocol
metadata:
  tags:
    - ghcp-sdk
    - hosted-agent
protocols:
  - protocol: invocations    # GHCP SDK SSE streaming (container runtime)
    version: 1.0.0
  - protocol: responses      # For bot (oai.responses.create) and azd ai agent invoke
    version: 1.0.0
# ⚠️ UNTESTED: dual protocol declaration. If this doesn't work, the bot must
# call via the Invocations protocol (SSE) instead of Responses API, OR the
# agent must switch to MAF runtime (ResponsesHostServer) which natively serves responses.
environment_variables:
  - name: MODEL_DEPLOYMENT_NAME
    value: gpt-5.4
  # Add MCP server FQDNs if needed:
  # - name: MCP_SERVER_FQDN
  #   value: ${MCP_SERVER_FQDN}
resources:
  cpu: "1"
  memory: 2Gi
